<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jason's Softphone</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-mark">&#9742;</span>
      <h1>Jason's Softphone</h1>
    </div>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">
      Enter your name and email to authenticate the softphone.
    </p>

    {% if error %}
      <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
      <div class="field">
        <label for="email">Work Email</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autofocus>
      </div>
      <div class="field-row">
        <div class="field">
          <label for="first_name">First Name</label>
          <input type="text" id="first_name" name="first_name" placeholder="Jane" required>
        </div>
        <div class="field">
          <label for="last_name">Last Name</label>
          <input type="text" id="last_name" name="last_name" placeholder="Smith" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Open Softphone</button>
    </form>
  </div>
</body>
</html>
